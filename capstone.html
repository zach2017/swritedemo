<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capstone Mentor — Social Work Excellence Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1b2a22;
    --forest: #2a4637;
    --sage: #5b7a65;
    --fern: #8aab94;
    --sand: #d4c5a0;
    --gold: #c9a84c;
    --gold-light: #e6d48a;
    --cream: #f6f2ea;
    --parchment: #ede8dc;
    --white: #ffffff;
    --success: #3a7d53;
    --error: #9e4a3a;
    --radius: 14px;
    --shadow-sm: 0 2px 8px rgba(27,42,34,0.06);
    --shadow-md: 0 8px 30px rgba(27,42,34,0.1);
    --shadow-lg: 0 16px 50px rgba(27,42,34,0.14);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  h1, h2, h3, h4 { font-family: 'Cormorant Garamond', serif; }

  ::-webkit-scrollbar { width: 7px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--sand); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--gold); }

  /* ---- ANIMATIONS ---- */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
  @keyframes dotBounce {
    0%,80%,100% { transform: scale(0); }
    40% { transform: scale(1); }
  }
  .fade-up { animation: fadeUp .6s ease both; }
  .fade-in { animation: fadeIn .5s ease both; }
  .stagger-1 { animation-delay: .08s; }
  .stagger-2 { animation-delay: .16s; }
  .stagger-3 { animation-delay: .24s; }
  .stagger-4 { animation-delay: .32s; }

  /* ---- NAV ---- */
  #topnav {
    position: sticky; top: 0; z-index: 100;
    background: linear-gradient(135deg, var(--ink) 0%, var(--forest) 100%);
    border-bottom: 3px solid var(--gold);
    box-shadow: 0 4px 20px rgba(0,0,0,.2);
  }
  #topnav .inner { max-width: 1260px; margin: auto; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 64px; }
  .nav-brand { display: flex; align-items: center; gap: 12px; }
  .nav-logo {
    width: 44px; height: 44px; border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; font-weight: 800; color: var(--ink);
    font-family: 'Cormorant Garamond', serif;
    box-shadow: 0 2px 10px rgba(201,168,76,.35);
  }
  .nav-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 700; color: var(--gold-light); letter-spacing: .01em; }
  .nav-subtitle { font-size: 10px; color: var(--fern); letter-spacing: .1em; text-transform: uppercase; font-weight: 500; }
  .nav-links { display: flex; gap: 2px; align-items: center; }
  .nav-link {
    padding: 7px 14px; border-radius: 8px; font-size: 13px; font-weight: 500;
    color: var(--fern); background: transparent; border: none; cursor: pointer;
    transition: all .25s ease; font-family: 'Outfit', sans-serif; white-space: nowrap;
  }
  .nav-link:hover { color: var(--gold-light); background: rgba(201,168,76,.1); }
  .nav-link.active { color: var(--gold-light); background: rgba(201,168,76,.18); font-weight: 700; }
  .lang-select {
    background: rgba(201,168,76,.12); border: 1px solid rgba(201,168,76,.3);
    border-radius: 8px; padding: 6px 10px; color: var(--gold-light); font-size: 12px;
    font-family: 'Outfit', sans-serif; cursor: pointer; outline: none;
  }
  .lang-select option { background: var(--ink); color: var(--gold-light); }
  #mobileToggle { display: none; background: none; border: none; color: var(--gold-light); font-size: 26px; cursor: pointer; padding: 4px; }
  #mobileMenu { display: none; flex-wrap: wrap; gap: 6px; padding: 0 20px 14px; }
  #mobileMenu.open { display: flex; }

  @media(max-width: 1023px) {
    .nav-links { display: none; }
    #mobileToggle { display: block; }
  }

  /* ---- PAGE CONTAINER ---- */
  .page { display: none; }
  .page.visible { display: block; }
  .section-head { max-width: 1060px; margin: 0 auto; padding: 48px 20px 0; }
  .section-head h2 { font-size: clamp(28px, 4vw, 40px); font-weight: 700; color: var(--ink); margin-bottom: 6px; }
  .section-head .rule { width: 56px; height: 3px; background: linear-gradient(90deg, var(--gold), var(--gold-light)); border-radius: 2px; margin-bottom: 28px; }
  .section-body { max-width: 1060px; margin: 0 auto; padding: 0 20px 56px; }

  /* ---- HERO ---- */
  .hero {
    background: linear-gradient(160deg, var(--ink) 0%, var(--forest) 40%, #3b5c4a 100%);
    padding: 72px 20px 64px; text-align: center; position: relative; overflow: hidden;
  }
  .hero::before {
    content: ''; position: absolute; inset: 0; opacity: .06;
    background-image: radial-gradient(circle at 25% 45%, var(--gold) 1.2px, transparent 1.2px),
      radial-gradient(circle at 75% 25%, var(--gold) .8px, transparent .8px);
    background-size: 54px 54px, 38px 38px;
  }
  .hero::after {
    content: ''; position: absolute; bottom: -2px; left: 0; right: 0; height: 60px;
    background: linear-gradient(to top, var(--cream), transparent);
  }
  .hero h1 { font-size: clamp(30px, 5.5vw, 52px); font-weight: 700; color: var(--gold-light); margin-bottom: 16px; position: relative; line-height: 1.15; }
  .hero p { font-size: clamp(14px, 2vw, 18px); color: var(--fern); max-width: 620px; margin: 0 auto 36px; line-height: 1.65; position: relative; }
  .stat-bar { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; position: relative; }
  .stat-chip {
    background: rgba(201,168,76,.1); border: 1px solid rgba(201,168,76,.22);
    border-radius: 8px; padding: 10px 22px; color: var(--gold);
    font-size: 14px; font-weight: 600; letter-spacing: .01em;
  }

  /* ---- CARDS ---- */
  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 28px; }
  .path-card {
    background: var(--white); border: 1px solid #e2dace; border-radius: var(--radius);
    padding: 28px; cursor: pointer; transition: all .3s ease; box-shadow: var(--shadow-sm);
    position: relative; overflow: hidden;
  }
  .path-card::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--gold), var(--gold-light)); transform: scaleX(0);
    transform-origin: left; transition: transform .35s ease;
  }
  .path-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); border-color: var(--sand); }
  .path-card:hover::after { transform: scaleX(1); }
  .path-card .icon { font-size: 34px; margin-bottom: 14px; display: block; }
  .path-card h3 { font-size: 22px; font-weight: 700; color: var(--ink); margin-bottom: 6px; }
  .path-card p { font-size: 14px; color: var(--sage); line-height: 1.55; }

  /* ---- TABS ---- */
  .tab-bar { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 28px; }
  .tab-btn {
    padding: 9px 20px; border-radius: 24px; font-size: 13px; font-weight: 600;
    border: none; cursor: pointer; transition: all .25s; font-family: 'Outfit', sans-serif;
    background: var(--parchment); color: var(--sage);
  }
  .tab-btn.active { background: linear-gradient(135deg, var(--ink), var(--forest)); color: var(--gold-light); box-shadow: 0 4px 14px rgba(27,42,34,.15); }
  .tab-btn:hover:not(.active) { background: #e0d9ca; }

  /* ---- CONTENT PANEL ---- */
  .content-panel {
    background: var(--white); border-radius: var(--radius); border: 1px solid #e2dace;
    overflow: hidden; box-shadow: var(--shadow-sm);
  }
  .panel-header {
    background: linear-gradient(135deg, #faf6ee, var(--parchment));
    padding: 24px 28px; border-bottom: 1px solid #e2dace;
  }
  .panel-header h3 { font-size: 24px; font-weight: 700; color: var(--ink); }
  .panel-body { padding: 24px 28px; font-size: 15px; color: var(--forest); line-height: 1.78; }

  /* ---- ETHICS ---- */
  .value-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
  .value-chip {
    background: linear-gradient(135deg, rgba(42,70,55,.07), rgba(90,122,101,.07));
    border-radius: 22px; padding: 9px 18px; font-size: 13px; font-weight: 600; color: var(--forest);
  }
  .scenario-card {
    background: var(--white); border-radius: var(--radius); border: 1px solid #e2dace;
    overflow: hidden; margin-bottom: 16px; transition: border-color .3s;
  }
  .scenario-card.open { border-color: var(--gold); border-width: 2px; }
  .scenario-toggle {
    width: 100%; padding: 20px 24px; background: none; border: none; cursor: pointer;
    display: flex; justify-content: space-between; align-items: center; gap: 12px;
  }
  .scenario-toggle h3 { font-size: 19px; font-weight: 700; color: var(--ink); text-align: left; }
  .scenario-arrow { font-size: 18px; color: var(--gold); transition: transform .3s; flex-shrink: 0; }
  .scenario-card.open .scenario-arrow { transform: rotate(180deg); }
  .scenario-body { display: none; padding: 0 24px 24px; }
  .scenario-card.open .scenario-body { display: block; }
  .scenario-situation { background: var(--parchment); border-radius: 10px; padding: 18px; margin-bottom: 14px; }
  .scenario-situation p { font-size: 14px; color: var(--forest); line-height: 1.6; }
  .scenario-situation .question { font-weight: 700; color: var(--ink); font-style: italic; margin-top: 10px; }
  .reveal-btn {
    background: linear-gradient(135deg, var(--ink), var(--forest)); color: var(--gold-light);
    border: none; border-radius: 10px; padding: 11px 22px; font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: 'Outfit', sans-serif; transition: box-shadow .3s;
  }
  .reveal-btn:hover { box-shadow: 0 4px 16px rgba(27,42,34,.2); }
  .guidance-box {
    background: linear-gradient(135deg, rgba(42,70,55,.04), rgba(201,168,76,.06));
    border-radius: 10px; padding: 18px; border-left: 4px solid var(--gold);
    font-size: 14px; color: var(--forest); line-height: 1.7; margin-top: 14px;
  }

  /* ---- THEORY ---- */
  .theory-selector { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; margin-bottom: 28px; }
  .theory-btn {
    padding: 18px 14px; border-radius: 12px; border: 1px solid #e2dace; cursor: pointer;
    text-align: center; transition: all .25s; background: var(--white);
  }
  .theory-btn.active { background: linear-gradient(135deg, var(--ink), var(--forest)); border-color: var(--gold); box-shadow: 0 4px 16px rgba(27,42,34,.15); }
  .theory-btn .label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .12em; margin-bottom: 4px; }
  .theory-btn.active .label { color: var(--gold); }
  .theory-btn:not(.active) .label { color: var(--fern); }
  .theory-btn .name { font-size: 13px; font-weight: 700; }
  .theory-btn.active .name { color: var(--gold-light); }
  .theory-btn:not(.active) .name { color: var(--ink); }
  .theory-detail-head {
    background: linear-gradient(135deg, var(--ink), var(--forest));
    padding: 30px 28px; border-radius: var(--radius) var(--radius) 0 0;
  }
  .theory-detail-head .key { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .13em; color: var(--gold); margin-bottom: 6px; }
  .theory-detail-head h3 { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 700; color: var(--gold-light); margin-bottom: 8px; }
  .theory-detail-head p { font-size: 14px; color: var(--fern); line-height: 1.6; }
  .theory-apps { padding: 28px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media(max-width: 600px) { .theory-apps { grid-template-columns: 1fr; } }
  .theory-app-item {
    display: flex; align-items: center; gap: 12px;
    background: var(--parchment); border-radius: 10px; padding: 14px 16px;
  }
  .theory-app-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gold); flex-shrink: 0; }
  .theory-app-item span { font-size: 14px; color: var(--forest); }

  /* ---- EXAM ---- */
  .exam-progress { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; }
  .exam-counter { font-size: 13px; color: var(--fern); font-weight: 600; }
  .progress-track { width: 200px; height: 8px; background: var(--parchment); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-light)); border-radius: 4px; transition: width .4s ease; }
  .question-text { font-size: 17px; font-weight: 600; color: var(--ink); line-height: 1.6; margin-bottom: 24px; font-family: 'Outfit', sans-serif; }
  .option-btn {
    width: 100%; padding: 15px 18px; border-radius: 12px; background: var(--parchment);
    border: 2px solid transparent; text-align: left; cursor: pointer; font-family: 'Outfit', sans-serif;
    font-size: 14px; color: var(--forest); font-weight: 500; transition: all .2s;
    display: flex; align-items: center; gap: 14px; margin-bottom: 10px;
  }
  .option-btn:hover:not(:disabled) { border-color: var(--sand); background: #f0ebdf; }
  .option-btn.selected { border-color: var(--gold); background: rgba(201,168,76,.12); }
  .option-btn.correct { border-color: var(--success); background: rgba(58,125,83,.1); color: #1a4f2a; }
  .option-btn.wrong { border-color: var(--error); background: rgba(158,74,58,.08); color: var(--error); }
  .option-letter {
    width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0;
    background: rgba(42,70,55,.08); color: var(--sage);
  }
  .option-btn.selected .option-letter { background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: var(--ink); }
  .explanation-box { margin-top: 18px; padding: 16px 18px; border-radius: 10px; font-size: 14px; line-height: 1.65; }
  .explanation-box.correct-exp { background: rgba(58,125,83,.06); border-left: 4px solid var(--success); color: var(--forest); }
  .explanation-box.wrong-exp { background: rgba(158,74,58,.06); border-left: 4px solid var(--error); color: var(--forest); }
  .explanation-box .verdict { font-weight: 700; margin-bottom: 6px; }
  .exam-actions { margin-top: 20px; display: flex; justify-content: flex-end; }
  .btn-primary {
    background: linear-gradient(135deg, var(--ink), var(--forest)); color: var(--gold-light);
    border: none; border-radius: 10px; padding: 12px 26px; font-size: 14px; font-weight: 600;
    cursor: pointer; font-family: 'Outfit', sans-serif; transition: box-shadow .3s;
  }
  .btn-primary:hover { box-shadow: 0 4px 16px rgba(27,42,34,.18); }
  .btn-primary:disabled { opacity: .4; cursor: default; box-shadow: none; }
  .btn-gold {
    background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: var(--ink);
    border: none; border-radius: 10px; padding: 12px 26px; font-size: 14px; font-weight: 700;
    cursor: pointer; font-family: 'Outfit', sans-serif;
  }
  .score-circle {
    width: 150px; height: 150px; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; margin: 28px auto;
    font-family: 'Cormorant Garamond', serif; font-size: 48px; font-weight: 700; color: #fff;
  }
  .score-high { background: linear-gradient(135deg, var(--ink), #2d6a3e); }
  .score-mid { background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: var(--ink) !important; }
  .score-low { background: linear-gradient(135deg, #7a3e30, var(--error)); }

  /* ---- MILESTONES ---- */
  .phase-card { background: var(--white); border-radius: var(--radius); border: 1px solid #e2dace; overflow: hidden; margin-bottom: 18px; }
  .phase-header { padding: 20px 24px; border-bottom: 1px solid #e8e2d4; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
  .phase-header h3 { font-size: 20px; font-weight: 700; color: var(--ink); }
  .phase-header .weeks { font-size: 12px; color: var(--fern); font-weight: 600; }
  .phase-progress-wrap { display: flex; align-items: center; gap: 10px; }
  .phase-progress-bar { width: 110px; height: 8px; background: var(--parchment); border-radius: 4px; overflow: hidden; }
  .phase-progress-fill { height: 100%; border-radius: 4px; transition: width .35s ease; }
  .phase-pct { font-size: 12px; font-weight: 700; min-width: 36px; text-align: right; }
  .phase-tasks { padding: 4px 24px 16px; }
  .task-row {
    display: flex; align-items: flex-start; gap: 14px; padding: 12px 0;
    border-bottom: 1px solid #f2eddf; cursor: pointer; user-select: none;
  }
  .task-row:last-child { border-bottom: none; }
  .task-check {
    width: 22px; height: 22px; border-radius: 6px; border: 2px solid var(--sand);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    margin-top: 1px; transition: all .25s; font-size: 13px; color: transparent;
  }
  .task-row.done .task-check { background: var(--gold); border-color: var(--gold); color: var(--white); }
  .task-label { font-size: 14px; color: var(--forest); line-height: 1.5; transition: all .25s; }
  .task-row.done .task-label { color: var(--fern); text-decoration: line-through; }
  .tip-box {
    background: linear-gradient(135deg, #faf6ee, var(--parchment)); border-radius: 12px;
    padding: 18px 22px; border-left: 4px solid var(--gold); margin-top: 8px;
    font-size: 14px; color: var(--forest); font-weight: 600;
  }

  /* ---- ACCESSIBILITY ---- */
  .access-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 18px; }
  .access-card { background: var(--white); border-radius: var(--radius); border: 1px solid #e2dace; overflow: hidden; }
  .access-card-head { background: linear-gradient(135deg, var(--ink), var(--forest)); padding: 22px; }
  .access-card-head h3 { font-size: 18px; font-weight: 700; color: var(--gold-light); margin-bottom: 6px; }
  .access-card-head p { font-size: 13px; color: var(--fern); line-height: 1.5; }
  .access-card-body { padding: 16px 22px; }
  .access-item { display: flex; align-items: center; gap: 12px; padding: 9px 0; border-bottom: 1px solid #f2eddf; }
  .access-item:last-child { border-bottom: none; }
  .access-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); flex-shrink: 0; }
  .access-item span { font-size: 13px; color: var(--forest); line-height: 1.45; }

  /* ---- AI CHAT ---- */
  .chat-wrap { display: flex; flex-direction: column; min-height: 520px; }
  .example-prompts { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
  .example-btn {
    background: var(--parchment); border: 1px solid #e2dace; border-radius: 22px;
    padding: 9px 18px; font-size: 12px; color: var(--sage); cursor: pointer;
    font-family: 'Outfit', sans-serif; font-weight: 500; transition: all .25s;
  }
  .example-btn:hover { border-color: var(--gold); background: rgba(201,168,76,.12); color: var(--forest); }
  .chat-messages {
    flex: 1; overflow-y: auto; background: var(--white); border-radius: var(--radius);
    border: 1px solid #e2dace; padding: 22px; margin-bottom: 16px; min-height: 300px;
  }
  .chat-msg { display: flex; margin-bottom: 14px; }
  .chat-msg.user { justify-content: flex-end; }
  .chat-msg.ai { justify-content: flex-start; }
  .chat-bubble {
    max-width: 82%; padding: 16px 20px; font-size: 14px; line-height: 1.7;
    white-space: pre-wrap; word-break: break-word;
  }
  .chat-msg.user .chat-bubble {
    background: linear-gradient(135deg, var(--ink), var(--forest));
    color: var(--gold-light); border-radius: 16px 16px 4px 16px;
  }
  .chat-msg.ai .chat-bubble {
    background: var(--parchment); color: var(--forest);
    border-radius: 16px 16px 16px 4px;
  }
  .typing-dots span {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    background: var(--fern); margin-right: 4px;
    animation: dotBounce 1.4s infinite ease-in-out both;
  }
  .typing-dots span:nth-child(1) { animation-delay: -.32s; }
  .typing-dots span:nth-child(2) { animation-delay: -.16s; }
  .chat-input-row { display: flex; gap: 10px; }
  .chat-input {
    flex: 1; padding: 14px 20px; border-radius: 14px; border: 2px solid #e2dace;
    font-family: 'Outfit', sans-serif; font-size: 14px; color: var(--ink); outline: none;
    transition: border-color .25s; background: var(--white);
  }
  .chat-input::placeholder { color: var(--fern); }
  .chat-input:focus { border-color: var(--gold); }
  .chat-send {
    background: linear-gradient(135deg, var(--ink), var(--forest)); color: var(--gold-light);
    border: none; border-radius: 14px; padding: 14px 26px; font-size: 14px; font-weight: 700;
    cursor: pointer; font-family: 'Outfit', sans-serif; white-space: nowrap; transition: box-shadow .3s;
  }
  .chat-send:hover { box-shadow: 0 4px 16px rgba(27,42,34,.2); }

  /* ---- FOOTER ---- */
  footer {
    background: linear-gradient(135deg, var(--ink), var(--forest));
    padding: 22px 20px; text-align: center; border-top: 3px solid var(--gold);
  }
  footer p { font-size: 12px; color: var(--fern); }
</style>

};

function getAIReply(input) {
  const l = input.toLowerCase();
  if (l.includes("literature") || l.includes("review") || l.includes("estructura") || l.includes("revue")) return AI.literature;
  if (l.includes("crisis") || l.includes("intervención") || l.includes("crise")) return AI.crisis;
  if (l.includes("system") || l.includes("sistema") || l.includes("système") || l.includes("welfare") || l.includes("bienestar")) return AI.system;
  if (l.includes("ethic") || l.includes("ética") || l.includes("éthique") || l.includes("confidential") || l.includes("dilemma") || l.includes("dilema")) return AI.ethic;
  return AI.default;
}

let lang = 'en';
let activePage = 'home';
let writingTab = 0;
let theoryTab = 0;

let chatMessages = [];

function t() { return T[lang]; }

// ===== NAVIGATION =====
function navigate(page) {
  activePage = page;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('visible'));
  const el = document.getElementById('page-' + page);
  if (el) el.classList.add('visible');
  // Update nav active states
  document.querySelectorAll('.nav-link').forEach(b => b.classList.remove('active'));
  document.querySelectorAll(`.nav-link[data-page="${page}"]`).forEach(b => b.classList.add('active'));
  document.getElementById('mobileMenu').classList.remove('open');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleMobile() { document.getElementById('mobileMenu').classList.toggle('open'); }

function switchLang(l) { lang = l; renderAll(); }

// ===== RENDER FUNCTIONS =====

  const d = t();

  document.getElementById('navSubtitle').textContent = d.subtitle;

  const mobile = document.getElementById('mobileMenu');
  links.innerHTML = ''; mobile.innerHTML = '';

function renderExam() {
  const d = t();
  document.getElementById('examTitle').textContent = d.exam.title;
  const qs = d.exam.questions;
  const s = examState;

  if (s.finished) {
    const pct = Math.round((s.score / qs.length) * 100);
    const cls = pct >= 75 ? 'score-high' : pct >= 50 ? 'score-mid' : 'score-low';
    document.getElementById('examContent').innerHTML =
      `<div style="text-align:center">
        <h3 style="font-size:28px;font-weight:700;margin-bottom:4px;">${d.exam.score}</h3>
        <div class="score-circle ${cls}">${pct}%</div>
        <p style="font-size:18px;color:var(--sage);margin-bottom:28px;">${s.score} / ${qs.length}</p>
        <button class="btn-primary" onclick="examState={current:0,selected:null,submitted:false,score:0,finished:false};renderExam()">${d.exam.restart}</button>
      </div>`;
    return;
  }

  const q = qs[s.current];
  const pctProgress = ((s.current + 1) / qs.length) * 100;

  let optionsHtml = q.opts.map((opt, i) => {
    let cls = 'option-btn';
    if (s.submitted && i === q.ans) cls += ' correct';
    else if (s.submitted && i === s.selected && i !== q.ans) cls += ' wrong';
    else if (!s.submitted && i === s.selected) cls += ' selected';
    return `<button class="${cls}" ${s.submitted?'disabled':''} onclick="examSelect(${i})">
      <span class="option-letter">${String.fromCharCode(65+i)}</span>${opt}
    </button>`;
  }).join('');

  let expHtml = '';
  if (s.submitted) {
    const isCorrect = s.selected === q.ans;
    expHtml = `<div class="explanation-box ${isCorrect?'correct-exp':'wrong-exp'}">
      <div class="verdict">${isCorrect ? '✓ ' + d.exam.correct : '✗ ' + d.exam.incorrect}</div>
      ${q.exp}
    </div>`;
  }

  let actionHtml = '';
  if (!s.submitted) {
    actionHtml = `<button class="btn-primary" ${s.selected===null?'disabled':''} onclick="examSubmit()">${d.exam.submit}</button>`;
  } else {
    const label = s.current < qs.length - 1 ? d.exam.next : d.exam.score;
    actionHtml = `<button class="btn-gold" onclick="examNext()">${label}</button>`;
  }

  document.getElementById('examContent').innerHTML =
    `<div class="exam-progress">
      <span class="exam-counter">Question ${s.current+1} / ${qs.length}</span>
      <div class="progress-track"><div class="progress-fill" style="width:${pctProgress}%"></div></div>
    </div>
    <div class="content-panel" style="padding:28px;">
      <p class="question-text">${q.q}</p>
      ${optionsHtml}
      ${expHtml}
      <div class="exam-actions">${actionHtml}</div>
    </div>`;
}

function examSelect(i) { if (!examState.submitted) { examState.selected = i; renderExam(); } }
function examSubmit() {
  if (examState.selected === null) return;
  examState.submitted = true;
  const d = t();
  if (examState.selected === d.exam.questions[examState.current].ans) examState.score++;
  renderExam();
}
function examNext() {
  const d = t();
  if (examState.current < d.exam.questions.length - 1) {
    examState.current++; examState.selected = null; examState.submitted = false;
  } else { examState.finished = true; }
  renderExam();
}

function renderMilestones() {
  const d = t();
  document.getElementById('milestonesTitle').textContent = d.milestones.title;
  document.getElementById('milestonesTip').textContent = d.milestones.tip;
  document.getElementById('milestonesContent').innerHTML = d.milestones.phases.map((phase, pi) => {
    const total = phase.tasks.length;
    const done = phase.tasks.filter((_, ti) => milestoneChecks[`${pi}-${ti}`]).length;
    const pct = Math.round((done / total) * 100);
    const color = phase.color;
    return `<div class="phase-card">
      <div class="phase-header" style="background:linear-gradient(135deg,${color}12,${color}06)">
        <div>
          <h3>${phase.name}</h3>
          <span class="weeks">${phase.weeks}</span>
        </div>
        <div class="phase-progress-wrap">
          <div class="phase-progress-bar"><div class="phase-progress-fill" style="width:${pct}%;background:${color}"></div></div>
          <span class="phase-pct" style="color:${color}">${pct}%</span>
        </div>
      </div>
      <div class="phase-tasks">
        ${phase.tasks.map((task, ti) => {
          const checked = milestoneChecks[`${pi}-${ti}`];
          return `<div class="task-row ${checked?'done':''}" onclick="toggleTask(${pi},${ti})">
            <div class="task-check">${checked?'✓':''}</div>
            <span class="task-label">${task}</span>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

function toggleTask(pi, ti) {
  const key = `${pi}-${ti}`;
  milestoneChecks[key] = !milestoneChecks[key];
  renderMilestones();
}

    `<div class="access-card">
      <div class="access-card-head">
        <h3>${p.name}</h3>
        <p>${p.desc}</p>
      </div>

      </div>

function renderAI() {
  const d = t();
  document.getElementById('aiTitle').textContent = d.ai.title;
  document.getElementById('chatInput').placeholder = d.ai.placeholder;
  document.getElementById('chatSendBtn').textContent = d.ai.send;

  const exEl = document.getElementById('aiExamples');
  if (chatMessages.length === 0) {
    exEl.style.display = 'flex';
    exEl.innerHTML = d.ai.examples.map(ex =>
      `<button class="example-btn" onclick="sendChat('${ex.replace(/'/g, "\\'")}')">${ex}</button>`
    ).join('');
  } else { exEl.style.display = 'none'; }

  const msgEl = document.getElementById('chatMessages');
  let html = chatMessages.map(m =>
    `<div class="chat-msg ${m.role}"><div class="chat-bubble">${m.text}</div></div>`
  ).join('');
  if (chatLoading) {
    html += `<div class="chat-msg ai"><div class="chat-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div></div>`;
  }
  msgEl.innerHTML = html;
  msgEl.scrollTop = msgEl.scrollHeight;
}

function sendChat(text) {
  const input = text || document.getElementById('chatInput').value;
  if (!input.trim() || chatLoading) return;
  chatMessages.push({ role: 'user', text: input });
  document.getElementById('chatInput').value = '';
  chatLoading = true;
  renderAI();
  setTimeout(() => {
    chatMessages.push({ role: 'ai', text: getAIReply(input) });
    chatLoading = false;
    renderAI();
  }, 700 + Math.random() * 800);
}

function renderAll() {
  renderNav();
  renderHome();
  renderWriting();
  renderEthics();
  renderTheory();
  renderExam();
  renderMilestones();
  renderAccess();
  renderAI();
  navigate(activePage);
}

// ===== INIT =====
renderAll();
